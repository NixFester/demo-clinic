appId: com.democlinic.app
productName: DemoClinic
directories:
  output: dist-electron
npmRebuild: false
files:
  - "electron/**/*"
  - ".next/standalone/**/*"
  - ".next/static/**/*"
  - "public/**/*"
  - ".env"
  - "!node_modules/**/*"
asar: false
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/favicon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - deb
  icon: public/logo-elrhea.png
  category: Utility
